{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account List - LuyenThi</title>
    <link rel="stylesheet" href="{% static 'quizzes/css/home.css' %}">
    <!-- we pull in quiz_list.css for action button styles (edit/delete) -->
    <link rel="stylesheet" href="{% static 'quizzes/css/quiz_list.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    {% include 'quizzes/_navbar.html' %}
    <main class="container" style="margin-top: 40px;">
        <div class="header-nav">
            <div class="header-left-group">
                <a href="{% url 'home' %}" class="back-button">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h3 class="header-title"><span class="line"></span> Account List</h3>
            </div>
            <div class="header-right-group">
                <div class="search-box">
                    <input type="text" id="accountSearch" placeholder="Search users" value="{{ query|default:'' }}">
                    <i class="fas fa-search"></i>
                </div>
                <button class="btn-start" id="addAccountBtn" style="width: auto; padding: 10px 20px;">+ Add Account</button>
            </div>
        </div>

        <div class="account-table-container">
            <table class="account-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Account</th>
                        <th>Password</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user.name }}</td>
                        <td>{{ user.account }}</td>
                        <td>{{ user.password }}</td>
                        <td>
                            <button class="action-btn edit-btn" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn delete-btn" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

    <!-- modal for new account (simple) -->
    <div id="addAccountModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Account</h2>
                <button class="close">&times;</button>
            </div>
            <form id="addAccountForm">
                <div class="form-group">
                    <label for="fullName">Full name *</label>
                    <input type="text" id="fullName" name="full_name" required placeholder="Full name">
                </div>
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm password *</label>
                    <input type="password" id="confirmPassword" name="confirm_password" required placeholder="Confirm password">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelAddAccount">Cancel</button>
                    <button type="submit" class="btn-submit">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // search redirect
        const acctInput = document.getElementById('accountSearch');
        if (acctInput) {
            acctInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const q = acctInput.value.trim();
                    window.location.href = '{% url "account_list" %}?q=' + encodeURIComponent(q);
                }
            });
        }

        // modal logic
        const accModal = document.getElementById('addAccountModal');
        const addAccountBtn = document.getElementById('addAccountBtn');
        const closeAcc = document.querySelector('#addAccountModal .close');
        const cancelAcc = document.getElementById('cancelAddAccount');
        const accForm = document.getElementById('addAccountForm');

        addAccountBtn.addEventListener('click', function() {
            accModal.style.display = 'block';
        });
        closeAcc.addEventListener('click', () => { accModal.style.display='none'; accForm.reset(); });
        cancelAcc.addEventListener('click', () => { accModal.style.display='none'; accForm.reset(); });
        window.addEventListener('click', function(e){ if(e.target==accModal){ accModal.style.display='none'; accForm.reset(); }});
        accForm.addEventListener('submit', function(e){ e.preventDefault(); console.log('new account'); accModal.style.display='none'; accForm.reset(); });
    </script>
</body>
</html>

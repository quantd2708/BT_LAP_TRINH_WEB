{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - LuyenThi</title>
    <link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
</head>
<body>
    <div class="auth-container">
        <h2>Sign Up</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" name="full_name" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password" name="password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm your password" name="re_password" required>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Login now</a>
        </div>
    </div>
</body>
</html>

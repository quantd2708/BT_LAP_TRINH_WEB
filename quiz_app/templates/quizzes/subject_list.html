{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subjects - LuyenThi</title>
    <link rel="stylesheet" href="{% static 'quizzes/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'quizzes/css/subjects.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h1 class="logo">QUIZZZ</h1>
            <ul class="nav-links">
                <li><a href="#">History</a></li>
                <li><a href="#" class="active">Subjects</a></li>
                <li><a href="#">Account</a></li>
            </ul>
        </div>

        <div class="nav-right">
            <div class="search-bar">
                <input type="text" placeholder="Search...">
                <i class="fas fa-search"></i>
            </div>
            <div class="user-icon"><i class="fas fa-user-circle"></i></div>
        </div>
    </nav>

    <main class="container" style="margin-top: 40px;">
        <div class="header-nav">
            <div class="header-left-group">
                <a href="{% url 'home' %}" class="back-button">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <h3 class="header-title"><span class="line"></span> All Subjects</h3>
            </div>
            <div class="header-right-group">
                <div class="search-bar" style="background: white; border: 1px solid #ddd; border-radius: 5px;">
                     <input type="text" placeholder="Find subject..." style="width: 100%;">
                </div>
                <button class="btn-start" id="addSubjectBtn" style="width: auto; padding: 10px 20px;">+ Add Subject</button>
            </div>
        </div>

        <div class="grid-container">
            {% for subject in subjects %}
            <div class="subject-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <h4 class="subject-name">{{ subject.subject_name }}</h4>
                    <button style="background: none; border: none; color: #999; cursor: pointer; font-size: 12px;">X Delete</button>
                </div>
                
                <img src="{% static 'quizzes/images/subject1.png' %}" alt="Subject" style="height: 150px; object-fit: cover;">
                
                <div class="card-footer">
                    <span style="color: #999;">{{ subject.quiz_count }} quizzes</span>
                    <a href="#" class="btn-start" style="width: auto; padding: 5px 15px; font-size: 12px; text-decoration: none; color: white; display: inline-block;">View all</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- Modal for Adding Subject -->
    <div id="addSubjectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Subject</h2>
                <button class="close">&times;</button>
            </div>
            <form id="addSubjectForm">
                <div class="form-group">
                    <label for="subjectName">Subject Name *</label>
                    <input type="text" id="subjectName" name="subject_name" required placeholder="Enter subject name">
                </div>
                <div class="form-group">
                    <label for="subjectImage">Image</label>
                    <input type="file" id="subjectImage" name="image" accept="image/*">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-submit">Add Subject</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('addSubjectModal');
        const addSubjectBtn = document.getElementById('addSubjectBtn');
        const closeBtn = document.querySelector('.close');
        const cancelBtn = document.getElementById('cancelBtn');
        const form = document.getElementById('addSubjectForm');

        // Mở modal
        addSubjectBtn.addEventListener('click', function() {
            modal.style.display = 'block';
        });

        // Đóng modal khi bấm nút X
        closeBtn.addEventListener('click', function() {
            modal.style.display = 'none';
            form.reset();
        });

        // Đóng modal khi bấm Hủy
        cancelBtn.addEventListener('click', function() {
            modal.style.display = 'none';
            form.reset();
        });

        // Đóng modal khi bấm ngoài modal
        window.addEventListener('click', function(e) {
            if (e.target == modal) {
                modal.style.display = 'none';
                form.reset();
            }
        });

        // Xử lý submit form
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            // Ở đây bạn có thể gửi dữ liệu đến server bằng AJAX
            console.log('Form submitted');
            console.log('Subject Name:', document.getElementById('subjectName').value);
            // Sau khi submit thành công, đóng modal
            modal.style.display = 'none';
            form.reset();
        });
    </script>
</body>
</html>

<nav class="navbar">
    <div class="nav-left">
        <h1 class="logo">
            <a href="{% url 'home' %}" style="color: inherit; text-decoration: none;">QUIZZZ</a>
        </h1>
        <ul class="nav-links">
            <li><a href="{% url 'history' %}">History</a></li>
            <li><a href="{% url 'subject_list' %}">Subjects</a></li>
            {% if user.is_authenticated and user.role == 'admin' %}
            <li><a href="{% url 'account_list' %}">Account</a></li>
            {% endif %}
        </ul>
    </div>
    <div class="nav-right">
        <div class="search-bar">
            <input type="text" id="navSearch" placeholder="Search...">
            <i class="fas fa-search"></i>
        </div>
        
        <div class="user-profile-container" style="position: relative;">
            <div class="user-icon" id="userAvatarBtn" style="cursor: pointer;">
                <i class="fas fa-user-circle"></i>
            </div>
            
            <div class="user-dropdown" id="userDropdown" style="display: none; position: absolute; right: 0; top: 120%; background: white; min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; z-index: 1000;">
                {% if user.is_authenticated %}
                    <div style="padding: 12px 15px; border-bottom: 1px solid #eee; color: #1a3a52;">
                        <span style="display: block; font-size: 12px; color: #666;">Hello,</span>
                        <strong style="font-size: 14px;">{{ user.full_name|default:user.username }}</strong>
                    </div>
                    <a href="{% url 'logout' %}" style="display: block; padding: 12px 15px; color: #e74c3c; text-decoration: none; font-size: 14px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#f9ebea'" onmouseout="this.style.backgroundColor='transparent'">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" style="display: block; padding: 12px 15px; color: #1a3a52; text-decoration: none; font-size: 14px; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#f5f5f5'" onmouseout="this.style.backgroundColor='transparent'">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<script>
    // Xử lý tìm kiếm (Giữ nguyên)
    const navInput = document.getElementById('navSearch');
    if (navInput) {
        navInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const q = navInput.value.trim();
                window.location.href = '{% url "search" %}?q=' + encodeURIComponent(q);
            }
        });
    }

    // Xử lý Dropdown Menu cho Avatar
    const avatarBtn = document.getElementById('userAvatarBtn');
    const userDropdown = document.getElementById('userDropdown');

    if (avatarBtn && userDropdown) {
        // Bật/tắt menu khi bấm vào avatar
        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // Ngăn sự kiện click lan ra ngoài
            userDropdown.style.display = userDropdown.style.display === 'block' ? 'none' : 'block';
        });

        // Tự động đóng menu khi bấm ra vùng khác trên màn hình
        document.addEventListener('click', function(e) {
            if (!userDropdown.contains(e.target) && e.target !== avatarBtn) {
                userDropdown.style.display = 'none';
            }
        });
    }
</script>

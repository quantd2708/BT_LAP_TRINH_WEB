{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Result - QUIZZZ</title>
    <link rel="stylesheet" href="{% static 'quizzes/css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'quizzes/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'quizzes/css/exam.css' %}">
</head>
<body>
    {% include 'quizzes/_navbar.html' %}

    <main class="container" style="padding: 60px 0; max-width: 600px;">
        <div class="question-item result-container" style="padding: 40px;">
            <h2>Quiz Completed!</h2>
            <p>Quiz: <strong>{{ result.quiz.title }}</strong></p>
            
            <div class="result-score">
                {{ result.score }} / 10
            </div>
            
            <p>Time spent: <strong>{{ result.time_spent }} seconds</strong></p>
            <p>Completion date: {{ result.completed_at|date:"d/m/Y H:i" }}</p>

            <div class="result-buttons">
                <button class="btn btn-green" onclick="location.href='{% url 'exam' result.quiz.id %}'">Retake</button>        
                <button class="btn btn-yellow" onclick="location.href='{% url 'review_quiz' result.id %}'">View detailed answers</button>
                <button class="btn btn-green" onclick="location.href='{% url 'home' %}'">Take other quizzes</button>
            </div>
        </div>
    </main>
</body>
</html>

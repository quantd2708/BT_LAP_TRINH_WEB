{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - QUIZZZ</title>
    <link rel="stylesheet" href="{% static 'quizzes/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'quizzes/css/exam.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    {% include 'quizzes/_navbar.html' %}

    <main class="container" style="padding:80px 0;">
        <div class="result-container">
            <h2>Congratulations! You have completed the exam</h2>
            <p>{{ result.title }}</p>
            <p>Completed in {{ result.duration }} minutes</p>
            <div class="result-score">{{ result.score }}/{{ result.total }} points</div>
            <div class="result-buttons">
                <button class="btn btn-green">Retake</button>
                <button class="btn btn-yellow">View detailed answers</button>
                <button class="btn btn-green" onclick="location.href='{% url 'home' %}'">Take other English quizzes</button>
            </div>
        </div>
    </main>
</body>
</html>
